<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IdeaShield — Protect Your Ideas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;
  --bg2:#181818;
  --bg3:#202020;

  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);

  --text:#ffffff;
  --text2:#aaaaaa;
  --text3:#717171;

  /* YouTube Red */
  --accent:#ff0000;
  --accent2:#cc0000;

  /* Google Blue */
  --cyan:#4285f4;

  --emerald:#34a853;
  --amber:#fbbc05;
  --red:#ea4335;

  --grad:linear-gradient(135deg,#ff0000 0%,#ea4335 50%,#4285f4 100%);
  --grad2:linear-gradient(135deg,#ff0000,#cc0000);

  --shadow:0 8px 24px rgba(0,0,0,0.35);
  --shadow2:0 20px 60px rgba(0,0,0,0.55);

  --r:16px;
  --r2:12px;
}
html{scroll-behavior:smooth}
body{background:#121212;;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5,h6{font-family:'Syne',sans-serif;line-height:1.2}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--grad2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-nav{padding:16px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r2);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.03);color:var(--text);border-color:var(--border)}
.nav-item.active{background:rgba(108,99,255,0.12);color:var(--accent);border-color:rgba(108,99,255,0.25)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--grad2);border-radius:0 2px 2px 0}
.badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;min-width:20px;text-align:center}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.sidebar-overlay{display:none}
.main{margin-left:260px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:rgba(6,7,13,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;flex:1}
.avatar{width:36px;height:36px;background:var(--grad2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:2px solid rgba(108,99,255,0.4)}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
.page{padding:28px;flex:1}
.glass-card{
  background:#1e1e1e;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  transition:all .25s;
}
.glass-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.glass-card-shine{background:linear-gradient(135deg,rgba(108,99,255,0.08),rgba(0,212,255,0.04));border:1px solid rgba(108,99,255,0.2);border-radius:var(--r)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-weight:500;font-size:14px;cursor:pointer;transition:all .2s;border:none;outline:none}
.btn-primary{background:var(--grad2);color:#fff;box-shadow:0 4px 15px rgba(108,99,255,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,0.5)}
.btn-ghost{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--border2)}
.btn-danger{background:rgba(244,63,94,0.15);border:1px solid rgba(244,63,94,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(244,63,94,0.25)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-icon{padding:8px;border-radius:10px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{padding:20px}
.stat-number{font-family:'Syne',sans-serif;font-size:32px;font-weight:800}
.stat-label{color:var(--text2);font-size:13px;margin-top:4px}
.stat-change{font-size:12px;margin-top:8px}
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.idea-card{padding:20px;cursor:pointer}
.idea-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.idea-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.idea-desc{color:var(--text2);font-size:13px;line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.idea-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.idea-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;border:1px solid}
.idea-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.idea-hash{font-family:monospace;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.idea-actions{display:flex;gap:6px}
.sim-bar{height:4px;border-radius:99px;background:rgba(255,255,255,0.08);margin-top:10px;overflow:hidden}
.sim-fill{height:100%;border-radius:99px;transition:width .8s}
.shield-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:rgba(16,230,138,0.12);color:var(--emerald);border:1px solid rgba(16,230,138,0.25)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:60px 40px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.02)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(108,99,255,0.06)}
.input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.input:focus{border-color:var(--accent);background:rgba(108,99,255,0.06);box-shadow:0 0 0 3px rgba(108,99,255,0.1)}
.input::placeholder{color:var(--text3)}
.label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block}
.form-group{margin-bottom:18px}
select.input option{background:var(--bg2)}
.audit-item{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
.audit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:6px}
.audit-action{font-weight:600;font-size:13px;font-family:monospace}
.audit-detail{font-size:13px;color:var(--text2);margin-top:2px}
.audit-time{font-size:11px;color:var(--text3);margin-top:4px}
.alert-card{padding:18px 20px;margin-bottom:12px}
.alert-severity-high{border-color:rgba(244,63,94,0.35)!important;background:rgba(244,63,94,0.05)!important}
.alert-severity-low{border-color:rgba(245,158,11,0.3)!important}
.share-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px}
.share-avatar{width:36px;height:36px;border-radius:50%;background:var(--grad2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease;box-shadow:var(--shadow2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px}
.progress{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:var(--grad2);transition:width .3s}
.landing{min-height:100vh}
.nav-landing{position:sticky;top:0;z-index:100;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,7,13,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hero{text-align:center;padding:100px 20px 80px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse at center,rgba(108,99,255,0.18) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.3);border-radius:99px;padding:6px 16px;font-size:13px;font-weight:500;color:var(--accent);margin-bottom:28px;animation:fadeInUp .6s ease}
.hero-title{font-size:clamp(42px,6vw,80px);font-weight:800;line-height:1.1;max-width:800px;margin:0 auto 20px;animation:fadeInUp .6s ease .1s both}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:18px;color:var(--text2);max-width:560px;margin:0 auto 40px;animation:fadeInUp .6s ease .2s both;font-weight:300}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fadeInUp .6s ease .3s both}
.features{padding:80px 40px;max-width:1200px;margin:0 auto}
.features-title{text-align:center;font-size:clamp(28px,4vw,44px);font-weight:800;margin-bottom:12px}
.features-sub{text-align:center;color:var(--text2);margin-bottom:56px;font-size:16px}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.feature-card{padding:28px}
.feature-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.feature-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;margin-bottom:8px}
.feature-desc{color:var(--text2);font-size:14px;line-height:1.6}
.cta-section{padding:80px 40px;text-align:center;position:relative;overflow:hidden}
.cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(108,99,255,0.12) 0%,transparent 70%)}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 20% 50%,rgba(108,99,255,0.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,212,255,0.08) 0%,transparent 60%)}
.auth-card{width:100%;max-width:420px;padding:40px}
.auth-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;text-align:center;margin-bottom:8px}
.auth-sub{color:var(--text2);text-align:center;margin-bottom:32px;font-size:14px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;box-shadow:var(--shadow2);animation:slideInRight .3s ease;min-width:260px;max-width:360px}
.toast-success{border-color:rgba(16,230,138,0.3)}
.toast-error{border-color:rgba(244,63,94,0.3)}
.toast-info{border-color:rgba(108,99,255,0.3)}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px}
.tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:4px;margin-bottom:24px;overflow-x:auto}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .2s;border:none;background:none}
.tab.active{background:rgba(108,99,255,0.2);color:var(--accent)}
.code-block{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:monospace;font-size:12px;color:var(--cyan);overflow-x:auto;white-space:pre;word-break:break-all}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--text);margin-bottom:8px}
.chain-pulse{display:inline-flex;align-items:center;gap:6px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--emerald);animation:pulse 2s infinite;box-shadow:0 0 8px var(--emerald)}
.animate-pulse{animation:pulse 2s infinite}
.animate-spin{animation:spin 1s linear infinite}
.fade-in{animation:fadeInUp .4s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.features-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow2)}
  .sidebar-overlay{display:block;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)}
  .main{margin-left:0}
  .mobile-menu-btn{display:flex}
  .page{padding:16px}
  .topbar{padding:12px 16px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .ideas-grid{grid-template-columns:1fr}
  .features-grid{grid-template-columns:1fr}
  .nav-landing{padding:14px 20px}
  .features,.cta-section{padding:60px 20px}
  .hero{padding:70px 20px 60px}
  .hero-actions{flex-direction:column;align-items:center}
  .modal{padding:20px}
  .upload-zone{padding:40px 20px}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr}.stat-number{font-size:26px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

const MOCK_IDEAS = [
  {id:"1",title:"AI-Powered Code Review Bot",description:"Automated code review using GPT-4 with team integrations and PR comments",fileType:"pdf",fileName:"code_review_bot_pitch.pdf",fileSize:"2.4 MB",timestamp:new Date(Date.now()-86400000*3).toISOString(),txHash:"0x7f3a9b2c4d8e1f6a0b5c3d9e2f7a4b8c1d6e3f9a",ipfsHash:"QmXoypizjW3WknFiJnKLwHCnL72vedxjQkDDP1mXWo6uco",status:"protected",shares:["alice@team.com","bob@team.com"],similarity:12,tags:["AI","DevTools","Automation"]},
  {id:"2",title:"DeFi Yield Optimizer",description:"Cross-chain yield aggregator with auto-compounding and risk scoring",fileType:"pptx",fileName:"defi_optimizer_deck.pptx",fileSize:"8.7 MB",timestamp:new Date(Date.now()-86400000*7).toISOString(),txHash:"0x2a5f8d1b3e6c9a4f7b0e3d6a9c2f5b8e1d4a7c0f",ipfsHash:"QmYwAPJzv5CZsnA625s3Xf2nemtYgPpHdWEz79ojWnPbdG",status:"protected",shares:["charlie@team.com"],similarity:34,tags:["DeFi","Blockchain","Finance"]},
  {id:"3",title:"Carbon Credit Marketplace",description:"Tokenized carbon credits with real-world verification and trading",fileType:"zip",fileName:"carbon_market_code.zip",fileSize:"15.2 MB",timestamp:new Date(Date.now()-86400000*14).toISOString(),txHash:"0x9c1e4b7a0d3f6c9b2e5a8d1f4c7b0e3a6d9c2f5b",ipfsHash:"QmZbj4MEFHc3yoCi7PDAv7YHQEHpTG1bPBZMPbsNwbJJmS",status:"protected",shares:[],similarity:5,tags:["Climate","Web3","Marketplace"]},
];
const MOCK_ALERTS = [
  {id:"a1",ideaTitle:"DeFi Yield Optimizer",similarProject:"YieldMax Protocol",similarity:34,source:"GitHub",detectedAt:new Date(Date.now()-3600000).toISOString(),severity:"high"},
  {id:"a2",ideaTitle:"AI-Powered Code Review Bot",similarProject:"CodeAI Review",similarity:12,source:"ProductHunt",detectedAt:new Date(Date.now()-86400000).toISOString(),severity:"low"},
];
const MOCK_AUDIT = [
  {id:"au1",action:"IDEA_UPLOADED",ideaTitle:"Carbon Credit Marketplace",user:"you",time:new Date(Date.now()-86400000*14).toISOString()},
  {id:"au2",action:"BLOCKCHAIN_STAMPED",ideaTitle:"Carbon Credit Marketplace",user:"system",time:new Date(Date.now()-86400000*14+5000).toISOString()},
  {id:"au3",action:"IDEA_SHARED",ideaTitle:"DeFi Yield Optimizer",user:"you",time:new Date(Date.now()-86400000*6).toISOString()},
  {id:"au4",action:"IDEA_VIEWED",ideaTitle:"DeFi Yield Optimizer",user:"charlie@team.com",time:new Date(Date.now()-86400000*5).toISOString()},
  {id:"au5",action:"SIMILARITY_DETECTED",ideaTitle:"DeFi Yield Optimizer",user:"system",time:new Date(Date.now()-3600000).toISOString()},
  {id:"au6",action:"IDEA_UPLOADED",ideaTitle:"AI-Powered Code Review Bot",user:"you",time:new Date(Date.now()-86400000*3).toISOString()},
];
const TAG_COLORS=["bg-v","bg-c","bg-e","bg-a","bg-p"];
const TAG_STYLE=["rgba(108,99,255,0.2)","rgba(0,212,255,0.2)","rgba(16,230,138,0.2)","rgba(245,158,11,0.2)","rgba(244,63,94,0.2)"];
const TAG_TEXT=["#a78bfa","#67e8f9","#6ee7b7","#fcd34d","#fca5a5"];
const FILE_ICONS={pdf:"📄",pptx:"📊",zip:"🗜️",doc:"📝",docx:"📝",default:"📁"};
const fmt=iso=>new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const fmtT=iso=>new Date(iso).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
const shortH=h=>h?`${h.slice(0,8)}...${h.slice(-6)}`:"";

let tid=0;
const useToast=()=>{
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="info")=>{
    const id=++tid;
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  return{toasts,add};
};

const Toasts=({toasts})=>(
  <div className="toast-container">
    {toasts.map(t=>(
      <div key={t.id} className={`toast toast-${t.type}`}>
        <div className="toast-dot" style={{background:t.type==="success"?"var(--emerald)":t.type==="error"?"var(--red)":"var(--accent)"}}/>
        {t.msg}
      </div>
    ))}
  </div>
);

// SVG icons
const Ico=({n,s=18,c=""})=>{

// ── AUTH ──
const Auth=({mode,onAuth,onSwitch,onBack})=>{
  const [form,setForm]=useState({name:"",email:"",password:""});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const submit=async()=>{
    setErr("");
    if(!form.email||!form.password){setErr("Please fill all fields.");return;}
    if(mode==="signup"&&!form.name){setErr("Please enter your name.");return;}
    setLoading(true);
    await new Promise(r=>setTimeout(r,1000));
    setLoading(false);
    onAuth({name:form.name||"Alex Chen",email:form.email});
  };
  return(
    <div className="auth-page">
      <div className="glass-card auth-card fade-in">
        <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center",marginBottom:28}}>
          <div className="logo-icon"><Ico n="shield" s={18}/></div>
          <span className="logo-text">IdeaShield</span>
        </div>
        <h2 className="auth-title">{mode==="login"?"Welcome back":"Create account"}</h2>
        <p className="auth-sub">{mode==="login"?"Sign in to protect your ideas":"Start protecting your ideas today"}</p>
        {mode==="signup"&&(
          <div className="form-group">
            <label className="label">Full Name</label>
            <input className="input" placeholder="Alex Chen" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          </div>
        )}
        <div className="form-group">
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="you@startup.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        <div className="form-group">
          <label className="label">Password</label>
          <input className="input" type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {err&&<div style={{color:"var(--red)",fontSize:13,marginBottom:14}}>{err}</div>}
        <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",marginBottom:16,opacity:loading?.7:1}} onClick={submit} disabled={loading}>
          {loading?<><span className="animate-spin" style={{display:"inline-block",width:16,height:16,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%"}}/> Processing...</>:mode==="login"?"Sign In":"Create Account"}
        </button>
        <div style={{textAlign:"center",fontSize:13,color:"var(--text2)"}}>
          {mode==="login"?"Don't have an account? ":"Already have an account? "}
          <span style={{color:"var(--accent)",cursor:"pointer",fontWeight:500}} onClick={onSwitch}>{mode==="login"?"Sign up":"Sign in"}</span>
        </div>
        <div style={{textAlign:"center",marginTop:16}}>
          <span style={{color:"var(--text3)",fontSize:12,cursor:"pointer"}} onClick={onBack}>← Back to home</span>
        </div>
      </div>
    </div>
  );
};

    if(!res.ok){const e=await res.json();throw new Error(e.error?.details||"Pinata upload failed");}
    const result=await res.json();
    return result.IpfsHash;
  };
  const go=async()=>{
    if(!form.title||!form.description){add("Please fill title and description","error");return;}
    if(PINATA_JWT==="YOUR_PINATA_JWT_HERE"){add("⚠️ Add your Pinata JWT in the code to enable real IPFS uploads","error");return;}
    setStep(1);
    setProg(20);await new Promise(r=>setTimeout(r,500));
    setProg(45);
    let ip;
    try{
      ip=await uploadToIPFS(file);
    }catch(e){
      add(`IPFS upload failed: ${e.message}`,"error");
      setStep(0);setProg(0);return;
    }
    setProg(65);await new Promise(r=>setTimeout(r,700));
    const h="0x"+Array.from({length:64},()=>Math.floor(Math.random()*16).toString(16)).join("");
    setProg(85);await new Promise(r=>setTimeout(r,700));
    setProg(100);await new Promise(r=>setTimeout(r,400));
    setTx(h);setIpfs(ip);setStep(2);
    onUpload({id:Date.now().toString(),title:form.title,description:form.description,fileType:file?.name?.split(".").pop()||"pdf",fileName:file?.name||"idea.pdf",fileSize:file?`${(file.size/1024/1024).toFixed(1)} MB`:"1.2 MB",timestamp:new Date().toISOString(),txHash:h,ipfsHash:ip,status:"protected",shares:[],similarity:Math.floor(Math.random()*20),tags:form.tags?form.tags.split(",").map(t=>t.trim()).filter(Boolean):["Idea"]});
    add("Idea protected on Polygon! 🛡️","success");
  };
  if(step===1)return(
    <div className="page fade-in">
      <div style={{maxWidth:500,margin:"60px auto",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:24}}>⛓️</div>
        <h2 style={{fontFamily:"Syne",fontWeight:800,marginBottom:8}}>Protecting Your Idea</h2>
        <p style={{color:"var(--text2)",marginBottom:36}}>Creating cryptographic proof on Polygon blockchain...</p>
        <div className="glass-card" style={{padding:28,textAlign:"left"}}>
          {[["Encrypt","AES-256 encryption",20],["IPFS","Decentralized storage",45],["Polygon","Blockchain timestamp",65],["Confirm","Network confirmation",85],["Done","Certificate issued",100]].map(([l,d,t])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:prog>=t?"var(--emerald)":prog>=t-20?"var(--accent)":"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .3s"}}>
                {prog>=t?<Ico n="check" s={14}/>:prog>=t-20?<span className="animate-spin" style={{display:"inline-block",width:12,height:12,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%"}}/>:null}
              </div>
              <div><div style={{fontWeight:600,fontSize:14}}>{l}</div><div style={{fontSize:12,color:"var(--text2)"}}>{d}</div></div>
            </div>
          ))}
          <div style={{marginTop:20}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text2)",marginBottom:8}}><span>Progress</span><span>{prog}%</span></div>
            <div className="progress"><div className="progress-fill" style={{width:`${prog}%`}}/></div>
          </div>
        </div>
      </div>
    </div>
  );
  const downloadProof=()=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,M=18,CW=W-M*2;
    const now=new Date();
    const dateStr=now.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    const timeStr=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

    // helpers
    const hex=(h)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];};
    const setFill=c=>doc.setFillColor(...hex(c));
    const setDraw=c=>doc.setDrawColor(...hex(c));
    const setTxt=c=>doc.setTextColor(...hex(c));
    const rr=(x,y,w,h,r,fill,stroke)=>{doc.roundedRect(x,y,w,h,r,r,fill&&stroke?"FD":fill?"F":"D");};

    // ── background ──
    setFill("#06070d"); doc.rect(0,0,W,297,"F");

    // ── header band ──
    setFill("#0d0f1a"); rr(M,10,CW,38,4,true,false);
    setDraw("#6c63ff"); doc.setLineWidth(0.4); rr(M,10,CW,38,4,false,true);

    // shield icon circle
    setFill("#6c63ff"); doc.circle(M+14,29,7,"F");
    setTxt("#ffffff"); doc.setFontSize(11); doc.setFont("helvetica","bold");
    doc.text("🛡",M+10.5,32.5);

    // title
    setTxt("#e8eaf6"); doc.setFontSize(18); doc.setFont("helvetica","bold");
    doc.text("IdeaShield",M+25,26);
    setTxt("#8b90b8"); doc.setFontSize(8); doc.setFont("helvetica","normal");
    doc.text("PROOF OF PROTECTION CERTIFICATE",M+25,33);

    // date top-right
    setTxt("#555a7a"); doc.setFontSize(7.5);
    doc.text(dateStr+" · "+timeStr,W-M,26,{align:"right"});

    // ── green status badge ──
    setFill("#0d2a1f"); rr(M,54,CW,12,3,true,false);
    setDraw("#10e68a"); doc.setLineWidth(0.3); rr(M,54,CW,12,3,false,true);
    setTxt("#10e68a"); doc.setFontSize(8); doc.setFont("helvetica","bold");
    doc.text("✓  IDEA SUCCESSFULLY PROTECTED ON POLYGON BLOCKCHAIN",W/2,61.5,{align:"center"});

    // ── idea details card ──
    let y=72;
    setFill("#0d0f1a"); rr(M,y,CW,52,4,true,false);
    setDraw("#1a1e3a"); doc.setLineWidth(0.3); rr(M,y,CW,52,4,false,true);

    setTxt("#8b90b8"); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
    doc.text("IDEA TITLE",M+8,y+9);
    setTxt("#e8eaf6"); doc.setFontSize(12); doc.setFont("helvetica","bold");
    const titleLines=doc.splitTextToSize(form.title,CW-16);
    doc.text(titleLines,M+8,y+17);

    const afterTitle=y+17+(titleLines.length-1)*5+6;
    setTxt("#8b90b8"); doc.setFontSize(7.5); doc.setFont("helvetica","normal");
    doc.text("DESCRIPTION",M+8,afterTitle);
    setTxt("#8b90b8"); doc.setFontSize(8.5);
    const descLines=doc.splitTextToSize(form.description,CW-16);
    doc.text(descLines,M+8,afterTitle+7);

    // ── hashes ──
    y=130;
    const hashBoxH=30;
    // TX hash
    setFill("#0d0f1a"); rr(M,y,CW,hashBoxH,4,true,false);
    setDraw("#6c63ff"); doc.setLineWidth(0.3); rr(M,y,CW,hashBoxH,4,false,true);
    setTxt("#8b90b8"); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
    doc.text("TRANSACTION HASH  (Polygon)",M+8,y+9);
    setFill("#131628"); rr(M+6,y+12,CW-12,12,2,true,false);
    setTxt("#00d4ff"); doc.setFontSize(7); doc.setFont("courier","normal");
    const txShort=tx.slice(0,42)+"..."+tx.slice(-6);
    doc.text(txShort,M+10,y+20);

    y=166;
    // IPFS hash
    setFill("#0d0f1a"); rr(M,y,CW,hashBoxH,4,true,false);
    setDraw("#6c63ff"); doc.setLineWidth(0.3); rr(M,y,CW,hashBoxH,4,false,true);
    setTxt("#8b90b8"); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
    doc.text("IPFS CONTENT IDENTIFIER",M+8,y+9);
    setFill("#131628"); rr(M+6,y+12,CW-12,12,2,true,false);
    setTxt("#00d4ff"); doc.setFontSize(7); doc.setFont("courier","normal");
    const ipfsShort=ipfs.slice(0,46)+"...";
    doc.text(ipfsShort,M+10,y+20);

    // ── metadata strip ──
    y=202;
    setFill("#0d0f1a"); rr(M,y,CW,28,4,true,false);
    setDraw("#1a1e3a"); doc.setLineWidth(0.3); rr(M,y,CW,28,4,false,true);

    const cols=[
      ["FILE",file?.name||"idea.pdf"],
      ["SIZE",file?`${(file.size/1024/1024).toFixed(1)} MB`:"—"],
      ["TAGS",form.tags||"Idea"],
      ["NETWORK","Polygon"],
    ];
    const colW=CW/4;
    cols.forEach(([lbl,val],i)=>{
      const cx=M+colW*i+colW/2;
      setTxt("#555a7a"); doc.setFontSize(6.5); doc.setFont("helvetica","bold");
      doc.text(lbl,cx,y+9,{align:"center"});
      setTxt("#e8eaf6"); doc.setFontSize(8); doc.setFont("helvetica","bold");
      const v=doc.splitTextToSize(val,colW-4);
      doc.text(v[0],cx,y+17,{align:"center"});
    });

    // ── encryption note ──
    y=236;
    setFill("#0f1120"); rr(M,y,CW,14,3,true,false);
    setDraw("#2a336a"); doc.setLineWidth(0.3); rr(M,y,CW,14,3,false,true);
    setTxt("#8b90b8"); doc.setFontSize(7.5); doc.setFont("helvetica","normal");
    doc.text("🔒  AES-256 encrypted · Decentralized IPFS storage · Immutable blockchain record",W/2,y+9,{align:"center"});

    // ── footer ──
    setFill("#0d0f1a"); doc.rect(0,272,W,25,"F");
    setDraw("#1a1e3a"); doc.setLineWidth(0.3); doc.line(M,272,W-M,272);
    setTxt("#555a7a"); doc.setFontSize(7); doc.setFont("helvetica","normal");
    doc.text("© 2025 IdeaShield — Built with ❤️ for hackathons  |  Protecting creators worldwide",W/2,281,{align:"center"});
    doc.text("This certificate serves as cryptographic proof of idea ownership.",W/2,287,{align:"center"});

    const safeTitle=(form.title||"idea").replace(/[^a-z0-9]/gi,"_").toLowerCase();
    doc.save(`IdeaShield_Proof_${safeTitle}.pdf`);
  };

  if(step===2)return(
    <div className="page fade-in">
      <div style={{maxWidth:540,margin:"60px auto",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:16}}>🎉</div>
        <h2 style={{fontFamily:"Syne",fontWeight:800,marginBottom:8,fontSize:28}}>Idea Protected!</h2>
        <p style={{color:"var(--text2)",marginBottom:32}}>Your idea is now timestamped on the Polygon blockchain.</p>
        <div className="glass-card" style={{padding:24,textAlign:"left",marginBottom:24}}>
          <div className="form-group"><label className="label">Transaction Hash</label><div className="code-block">{tx}</div></div>
          <div className="form-group" style={{marginBottom:0}}><label className="label">IPFS Hash</label><div className="code-block">{ipfs}</div></div>
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-primary" style={{padding:"12px 28px",fontSize:15}} onClick={downloadProof}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Proof PDF
          </button>
          <button className="btn btn-ghost" onClick={()=>{setStep(0);setFile(null);setForm({title:"",description:"",tags:""});setProg(0);}}>Upload Another</button>
        </div>
      </div>
    </div>
  );
  return(
    <div className="page fade-in">
      <div style={{marginBottom:28}}>
        <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:24,marginBottom:4}}>Upload & Protect Idea</h1>
        <p style={{color:"var(--text2)",fontSize:14}}>Your idea will be encrypted and timestamped on Polygon</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:20,alignItems:"start"}}>
        <div>
          <div className={`upload-zone${dragOver?" drag-over":""}`} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)setFile(f);}} onClick={()=>ref.current?.click()} style={{marginBottom:20}}>
            <input ref={ref} type="file" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)setFile(f);}} accept=".pdf,.pptx,.docx,.zip,.md,.txt"/>
            {file?(<><div style={{fontSize:48,marginBottom:12}}>✅</div><div style={{fontFamily:"Syne",fontWeight:700,marginBottom:8}}>{file.name}</div><div style={{color:"var(--text2)",fontSize:13}}>{(file.size/1024/1024).toFixed(2)} MB · Click to change</div></>):(<><div style={{fontSize:48,marginBottom:12}}>📁</div><div style={{fontFamily:"Syne",fontWeight:700,fontSize:18,marginBottom:8}}>Drop your file here</div><div style={{color:"var(--text2)",fontSize:14,marginBottom:16}}>or click to browse</div><div style={{fontSize:12,color:"var(--text3)"}}>PDF, PPTX, DOCX, ZIP, MD · Max 50MB</div></>)}
          </div>
          <div className="glass-card" style={{padding:24}}>
            <div className="form-group"><label className="label">Idea Title *</label><input className="input" placeholder="My Revolutionary Idea" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></div>
            <div className="form-group"><label className="label">Description *</label><textarea className="input" style={{minHeight:100,resize:"vertical"}} placeholder="Describe your idea in detail..." value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div>
            <div className="form-group" style={{marginBottom:0}}><label className="label">Tags (comma-separated)</label><input className="input" placeholder="AI, Blockchain, Healthcare" value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))}/></div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className="glass-card" style={{padding:20}}>
            <div style={{fontFamily:"Syne",fontWeight:700,marginBottom:16}}>Protection Summary</div>
            {[["🔐","AES-256 Encryption"],["⛓️","Polygon Timestamp"],["🌐","IPFS Storage"],["🔍","Similarity Scan"]].map(([ic,lb])=>(
              <div key={lb} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <div style={{width:32,height:32,borderRadius:8,background:"rgba(108,99,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{ic}</div>
                <span style={{fontSize:13,fontWeight:500}}>{lb}</span>
                <Ico n="check" s={14} c="" style={{marginLeft:"auto",color:"var(--emerald)"}}/>
              </div>
            ))}
          </div>
          <div className="glass-card-shine" style={{padding:18}}>
            <div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>Estimated gas fee</div>
            <div style={{fontFamily:"Syne",fontWeight:800,fontSize:22}}>~$0.003</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>On Polygon network</div>
          </div>
          <button className="btn btn-primary" style={{justifyContent:"center",padding:14,fontSize:15}} onClick={go}><Ico n="shield" s={18}/> Protect This Idea</button>
        </div>
      </div>
    </div>
  );
};

const ShareModal=({idea,onClose,add})=>{
  const [email,setEmail]=useState("");
  const [role,setRole]=useState("view");
  const [shares,setShares]=useState(idea.shares.map(e=>({email:e,role:"view"})));
  const addS=()=>{
    if(!email||!email.includes("@")){add("Enter a valid email","error");return;}
    if(shares.find(s=>s.email===email)){add("Already shared","error");return;}
    setShares(s=>[...s,{email,role}]);setEmail("");add(`Shared with ${email}`,"success");
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Share Idea</div>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Ico n="x" s={18}/></button>
        </div>
        <div style={{fontFamily:"Syne",fontWeight:600,marginBottom:4}}>{idea.title}</div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>Manage access permissions</div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <input className="input" placeholder="teammate@startup.com" value={email} onChange={e=>setEmail(e.target.value)} style={{flex:1}} onKeyDown={e=>e.key==="Enter"&&addS()}/>
          <select className="input" style={{width:110}} value={role} onChange={e=>setRole(e.target.value)}>
            <option value="view">View</option><option value="edit">Edit</option><option value="full">Full</option>
          </select>
          <button className="btn btn-primary" onClick={addS}><Ico n="plus" s={16}/></button>
        </div>
        {shares.length===0?<div style={{textAlign:"center",padding:"20px 0",color:"var(--text2)",fontSize:13}}>No one has access yet</div>:shares.map(s=>(
          <div key={s.email} className="share-row">
            <div className="share-avatar">{s.email[0].toUpperCase()}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500}}>{s.email}</div><div style={{fontSize:11,color:"var(--text3)"}}>Shared just now</div></div>
            <div style={{fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:99,background:"rgba(108,99,255,0.15)",color:"var(--accent)",textTransform:"uppercase"}}>{s.role}</div>
            <button className="btn btn-ghost btn-icon btn-sm" onClick={()=>setShares(p=>p.filter(x=>x.email!==s.email))}><Ico n="x" s={13}/></button>
          </div>
        ))}
        <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid var(--border)"}}>
          <div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>Share Link</div>
          <div style={{display:"flex",gap:8}}>
            <input className="input" readOnly value={`https://ideashield.app/view/${idea.id}`} style={{fontSize:12}}/>
            <button className="btn btn-ghost btn-sm" onClick={()=>{try{navigator.clipboard.writeText(`https://ideashield.app/view/${idea.id}`)}catch(e){}add("Link copied!","success");}}><Ico n="copy" s={14}/></button>
          </div>
        </div>
      </div>
    </div>
  );
};

      <div style={{marginBottom:24}}><h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:24,marginBottom:4}}>Similarity Alerts</h1><p style={{color:"var(--text2)",fontSize:14}}>AI-powered monitoring detects similar ideas across the web</p></div>
      <div className="glass-card-shine" style={{padding:"16px 20px",marginBottom:24,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div className="chain-pulse"><div className="pulse-dot"/></div>
        <div style={{fontSize:14,fontWeight:500,flex:1}}>Monitoring 3 ideas across GitHub, ProductHunt, HackerNews, and 12 more sources</div>
        <div style={{fontSize:12,color:"var(--text2)"}}>Last scan: 2 min ago</div>
      </div>
      {alerts.length===0?<div className="glass-card empty-state"><div style={{fontSize:48,marginBottom:16}}>✅</div><div className="empty-state-title">No Alerts</div><p>Your ideas appear unique. Keep building!</p></div>:
        alerts.map(a=>(
          <div key={a.id} className={`glass-card alert-card${a.severity==="high"?" alert-severity-high":" alert-severity-low"}`}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontSize:18}}>{a.severity==="high"?"🚨":"⚠️"}</span>
                  <span style={{fontFamily:"Syne",fontWeight:700,fontSize:15}}>{a.severity==="high"?"High":"Low"} Similarity Detected</span>
                  <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,background:a.severity==="high"?"rgba(244,63,94,0.2)":"rgba(245,158,11,0.2)",color:a.severity==="high"?"var(--red)":"var(--amber)",border:`1px solid ${a.severity==="high"?"rgba(244,63,94,0.4)":"rgba(245,158,11,0.4)"}`}}>{a.similarity}% match</span>
                </div>
                <div style={{fontSize:13,color:"var(--text2)",marginBottom:4}}>Your idea "<strong style={{color:"var(--text)"}}>{a.ideaTitle}</strong>" is similar to <strong style={{color:"var(--text)"}}>{a.similarProject}</strong> on {a.source}</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{fmt(a.detectedAt)} at {fmtT(a.detectedAt)}</div>
              </div>
              <div style={{display:"flex",gap:8}}><button className="btn btn-ghost btn-sm">View</button><button className="btn btn-ghost btn-sm" onClick={()=>dis(a.id)}>Dismiss</button></div>
            </div>
            <div style={{marginTop:14}}><div style={{fontSize:12,color:"var(--text2)",marginBottom:6}}>Similarity</div><div className="sim-bar" style={{height:6}}><div className="sim-fill" style={{width:`${a.similarity}%`,background:a.severity==="high"?"var(--red)":"var(--amber)"}}/></div></div>
          </div>
        ))
      }
    </div>
  );
};

// ── AUDIT ──
const Audit=()=>{
  const AC={IDEA_UPLOADED:"var(--accent)",BLOCKCHAIN_STAMPED:"var(--emerald)",IDEA_SHARED:"var(--cyan)",IDEA_VIEWED:"var(--text2)",SIMILARITY_DETECTED:"var(--red)"};
  const AI={IDEA_UPLOADED:"upload",BLOCKCHAIN_STAMPED:"chain",IDEA_SHARED:"share",IDEA_VIEWED:"eye",SIMILARITY_DETECTED:"alert"};
  return(
    <div className="page fade-in">
      <div style={{marginBottom:24}}><h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:24,marginBottom:4}}>Audit Trail</h1><p style={{color:"var(--text2)",fontSize:14}}>Immutable log of all activity on your ideas</p></div>
      <div className="glass-card" style={{padding:"8px 24px",maxWidth:700}}>
        {MOCK_AUDIT.map((e,i)=>(
          <div key={e.id} className="audit-item" style={{borderBottom:i===MOCK_AUDIT.length-1?"none":undefined}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:4}}>
              <div className="audit-dot" style={{background:AC[e.action]||"var(--text3)"}}/>
              {i<MOCK_AUDIT.length-1&&<div style={{width:1,flex:1,background:"var(--border)",marginTop:4}}/>}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{color:AC[e.action]}}><Ico n={AI[e.action]||"list"} s={14}/></span>
                <div className="audit-action" style={{color:AC[e.action]}}>{e.action.replace(/_/g," ")}</div>
              </div>
              <div className="audit-detail"><strong>{e.ideaTitle}</strong> · by {e.user}</div>
              <div className="audit-time">{fmt(e.time)} · {fmtT(e.time)}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:20,padding:"12px 20px",borderRadius:12,background:"rgba(108,99,255,0.06)",border:"1px solid rgba(108,99,255,0.15)",fontSize:13,color:"var(--text2)",maxWidth:700}}>🔒 This audit log is cryptographically signed and cannot be tampered with.</div>
    </div>
  );
};

// ── ROOT ──
const PAGE_TITLES={dashboard:"Dashboard",upload:"Upload Idea",ideas:"My Ideas",share:"Sharing",alerts:"Alerts",audit:"Audit Trail"};

function App(){
  const [view,setView]=useState("landing");
  const [page,setPage]=useState("dashboard");
  const [user,setUser]=useState(null);
  const [ideas,setIdeas]=useState(MOCK_IDEAS);
  const [sbOpen,setSbOpen]=useState(false);
  const {toasts,add}=useToast();
  return(
    <>
      <Toasts toasts={toasts}/>
      {view==="landing"&&<Landing onEnter={setView}/>}
      {view==="login"&&<Auth mode="login" onAuth={u=>{setUser(u);setView("app");}} onSwitch={()=>setView("signup")} onBack={()=>setView("landing")}/>}
      {view==="signup"&&<Auth mode="signup" onAuth={u=>{setUser(u);setView("app");}} onSwitch={()=>setView("login")} onBack={()=>setView("landing")}/>}
      {view==="app"&&(
        <div className="app">
          <Sidebar active={page} onNav={setPage} user={user} onLogout={()=>{setUser(null);setView("landing");setPage("dashboard");}} open={sbOpen} onClose={()=>setSbOpen(false)}/>
          <main className="main">
            <header className="topbar">
              <button className="mobile-menu-btn" onClick={()=>setSbOpen(o=>!o)}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>
              <div className="topbar-title">{PAGE_TITLES[page]}</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div className="chain-pulse"><div className="pulse-dot"/><span style={{fontSize:12,color:"var(--emerald)",fontWeight:600}}>Polygon</span></div>
                <div className="avatar" onClick={()=>add(`Logged in as ${user?.email}`,"info")}>{(user?.name||"U")[0]}</div>
              </div>
            </header>
            {page==="dashboard"&&<Dashboard ideas={ideas} onNav={setPage} user={user} add={add}/>}
            {page==="upload"&&<Upload onUpload={idea=>setIdeas(p=>[idea,...p])} add={add}/>}
            {page==="ideas"&&<Ideas ideas={ideas} setIdeas={setIdeas} add={add}/>}
            {page==="share"&&<Share ideas={ideas} add={add}/>}
            {page==="alerts"&&<Alerts add={add}/>}
            {page==="audit"&&<Audit/>}
          </main>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
